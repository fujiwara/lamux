version: 2
before:
  hooks:
    - go mod download
builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/lamux/
    binary: lamux
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
release:
  prerelease: "true"
  use_existing_draft: true
checksum:
  name_template: "checksums.txt"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
